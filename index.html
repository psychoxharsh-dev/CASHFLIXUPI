<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<script>
const offerMap = {
  'Coinswitch': 'C',
  'JigriSuper': 'JigriSuper'
};

const params = new URLSearchParams(window.location.search);
const source = params.get('source') || '';

// URL se offer name lo
const path = window.location.pathname;
const parts = path.split('/');
const cid = parts[parts.length - 1];
const offer = offerMap[cid];

if (offer) {
  fetch('/offers/' + offer + '.html')
    .then(r => r.text())
    .then(html => {
      // ✅ Source code inject karo
      const updatedHtml = html.replace(
        'window.location.search',
        `'?source=${source}'`
      );
      document.open();
      document.write(updatedHtml);
      document.close();
    });
} else {
  document.body.innerHTML = '<h2 style="text-align:center;margin-top:40px;font-family:sans-serif;">Offer Temporarily Paused</h2>';
}
</script>
</body>
</html>
